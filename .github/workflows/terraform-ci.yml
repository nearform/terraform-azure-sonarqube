name: Terraform Checks
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  terraform:
    name: Terraform Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
      pull-requests: write
    env:
      TF_LOG: WARN
      TF_IN_AUTOMATION: true
      TF_EXAMPLE_DIR: ${{ github.workspace }}/examples/default
      TF_MODULE_DIR: ${{ github.workspace }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: "1.14.5"

      - name: Terraform Init (example)
        id: init
        run: terraform -chdir=${{ env.TF_EXAMPLE_DIR }} init -backend=false

      - name: Terraform fmt
        id: fmt
        run: |
          terraform -chdir=${{ env.TF_EXAMPLE_DIR }} fmt -check
          terraform -chdir=${{ env.TF_MODULE_DIR }} fmt -check
        continue-on-error: true

      - name: Terraform Validate (example)
        id: validate
        run: terraform -chdir=${{ env.TF_EXAMPLE_DIR }} validate -no-color

      - name: Terraform Init (module)
        id: init_module
        run: terraform -chdir=${{ env.TF_MODULE_DIR }} init -backend=false

      - name: Terraform Test (module compliance)
        id: test
        run: terraform -chdir=${{ env.TF_MODULE_DIR }} test -no-color
        continue-on-error: true

      - name: Publish Results in PR comment
        uses: actions/github-script@v9.0.0
        if: github.event_name == 'pull_request'
        env:
          VALIDATE_OUTPUT: ${{ steps.validate.outputs.stdout }}
          TEST_OUTPUT: ${{ steps.test.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 1. Retrieve existing bot comments for the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Format and Style')
            })

            // 2. Prepare format of the comment
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            <details><summary>Validation Output</summary>

            \`\`\`\n
            ${process.env.VALIDATE_OUTPUT}
            \`\`\`

            </details>

            #### Terraform Test (mocked plan) 🧪\`${{ steps.test.outcome }}\`

            <details><summary>Test Output</summary>

            \`\`\`\n
            ${process.env.TEST_OUTPUT}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Example: \`${{ env.TF_EXAMPLE_DIR }}\`, Tests: \`${{ env.TF_MODULE_DIR }}/sonarqube.tftest.hcl\`, Workflow: \`${{ github.workflow }}\`*`;

            // 3. If we have a comment, update it, otherwise create a new one
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              })
            }

      - name: Terraform fmt Status
        if: steps.fmt.outcome == 'failure'
        run: exit 1

      - name: Terraform Test Status
        if: steps.test.outcome == 'failure'
        run: exit 1
